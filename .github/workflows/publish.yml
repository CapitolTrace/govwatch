name: Publish to npm

# Publishes when a GitHub release is created. Requires the NPM_TOKEN
# repository secret (an npm automation token for the @capitoltrace scope).
on:
  release:
    types: [published]

jobs:
  publish:
    # Only full semver tags (v0.2.0) publish; skip marker tags like v1.
    if: contains(github.event.release.tag_name, '.')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
